<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cloud-Wise Logo</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: white; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
    <!-- 云朵图标 -->
    <g fill="#3498db">
      <ellipse cx="20" cy="28" rx="12" ry="8"/>
      <ellipse cx="30" cy="22" rx="10" ry="7"/>
      <ellipse cx="38" cy="28" rx="12" ry="8"/>
      <ellipse cx="28" cy="30" rx="14" ry="6"/>
    </g>
    <!-- 勾选标记 -->
    <path d="M15 30 L22 37 L35 24" stroke="#27ae60" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 文字 -->
    <text x="50" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold">
      <tspan fill="#2c3e50">Cloud</tspan><tspan fill="#3498db">-</tspan><tspan fill="#27ae60">Wise</tspan>
    </text>
  </svg>
</body>
</html>
