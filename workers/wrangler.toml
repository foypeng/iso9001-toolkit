name = "iso9001-toolkit-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "iso9001-toolkit"
database_id = "YOUR_D1_DATABASE_ID"

# R2 存储桶配置
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "iso9001-docs"

# 环境变量
[vars]
DOMAIN = "yourdomain.com"
ADMIN_EMAIL = "your-email@example.com"
SENDGRID_API_KEY = "SG.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
SENDGRID_FROM_EMAIL = "noreply@yourdomain.com"

# 支付配置（实际使用时从 Cloudflare Dashboard 设置）
# WECHAT_PAY_KEY = "xxx"
# ALIPAY_KEY = "xxx"
